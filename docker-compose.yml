version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: printer-monitor-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/database:/app/database
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
    container_name: printer-monitor-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
