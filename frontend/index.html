<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Printer Monitor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      try {
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "background": "#121317",
                "on-error": "#690005",
                "secondary": "#ddfcff",
                "secondary-fixed": "#74f5ff",
                "primary-fixed": "#d7e2ff",
                "surface-container-low": "#1a1b1f",
                "surface-bright": "#38393d",
                "surface-container-lowest": "#0d0e11",
                "on-tertiary-container": "#8f3700",
                "on-secondary-fixed": "#002022",
                "surface-container-highest": "#343538",
                "on-tertiary-fixed": "#351000",
                "tertiary-fixed": "#ffdbcc",
                "on-primary-fixed-variant": "#2b4676",
                "tertiary-container": "#ffb696",
                "surface-variant": "#343538",
                "outline": "#8e909a",
                "surface": "#10131b",
                "primary-container": "#adc7ff",
                "glow-indigo": "rgba(173, 199, 255, 0.15)",
                "on-surface-variant": "#c4c6d0",
                "on-tertiary": "#571e00",
                "on-primary": "#112f5e",
                "inverse-primary": "#445e8f",
                "surface-container": "#1c2027",
                "on-error-container": "#ffdad6",
                "on-surface": "#e3e2e6",
                "secondary-container": "#00f1fe",
                "secondary-fixed-dim": "#00dbe7",
                "glow-cyan": "rgba(0, 241, 254, 0.15)",
                "on-secondary": "#00363a",
                "inverse-on-surface": "#2f3034",
                "surface-tint": "#adc7ff",
                "error": "#ffb4ab",
                "on-background": "#e3e2e6",
                "on-tertiary-fixed-variant": "#7c2e00",
                "on-secondary-fixed-variant": "#004f54",
                "tertiary-fixed-dim": "#ffb695",
                "on-secondary-container": "#006a70",
                "on-primary-fixed": "#001a40",
                "outline-variant": "#44474f",
                "primary": "#d8e3ff",
                "error-container": "#93000a",
                "tertiary": "#ffdbcd",
                "on-primary-container": "#385283",
                "inverse-surface": "#e3e2e6",
                "surface-container-high": "#292a2d",
                "surface-lowest": "#0b0e16",
                "glass-border": "rgba(255, 255, 255, 0.08)",
                "primary-fixed-dim": "#adc7ff",
                "surface-dim": "#121317"
              },
              "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
              },
              "spacing": {
                "gutter": "20px",
                "sidebar-width": "256px",
                "lg": "24px",
                "xs": "4px",
                "sm": "8px",
                "xl": "48px",
                "md": "16px",
                "container-padding": "32px"
              },
              "fontFamily": {
                "body-base": ["Inter"],
                "display-lg": ["Inter"],
                "label-mono": ["JetBrains Mono"],
                "label-micro": ["JetBrains Mono"],
                "headline-md": ["Inter"]
              },
              "fontSize": {
                "body-base": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "display-lg": ["48px", {"lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "label-mono": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                "label-micro": ["10px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "700"}],
                "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
              }
            }
          }
        }
      } catch (_e) {}
    </script>
  </head>
  <body class="bg-background text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
